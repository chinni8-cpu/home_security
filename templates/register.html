<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Security - Register</title>
    <style>
        /* ====== RESET & BASE ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ====== ANIMATED BACKGROUND ====== */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #f093fb, #f5576c);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #4facfe, #43e97b);
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #a18cd1, #fbc2eb);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        .orb-4 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #4facfe, #00f2fe);
            top: 20%;
            right: 10%;
            animation-delay: -3s;
        }

        .orb-5 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #f093fb, #f5576c);
            bottom: 20%;
            left: 10%;
            animation-delay: -7s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(40px, 20px) scale(1.05); }
        }

        /* ====== PARTICLES ====== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ====== REGISTER CONTAINER ====== */
        .register-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            margin: 20px;
        }

        .register-container {
            width: 100%;
            padding: 40px 35px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ====== LOGO & TITLE ====== */
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(240, 147, 251, 0.3);
            }
            50% {
                text-shadow: 0 0 40px rgba(240, 147, 251, 0.8), 0 0 80px rgba(240, 147, 251, 0.4);
            }
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-top: 5px;
            letter-spacing: 3px;
        }

        /* ====== FORM ====== */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        .form-group label i {
            margin-right: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: #f093fb;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px rgba(240, 147, 251, 0.15);
            transform: translateY(-2px);
        }

        .form-group input.error {
            border-color: #ff6b6b;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.15);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease;
        }

        .error-message.show {
            display: flex;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ====== PASSWORD STRENGTH ====== */
        .password-strength {
            margin-top: 8px;
            display: none;
        }

        .password-strength.show {
            display: block;
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-top: 5px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.5s ease;
            border-radius: 2px;
        }

        .strength-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 3px;
        }

        /* ====== TERMS ====== */
        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }

        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #f093fb;
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms a {
            color: #f093fb;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* ====== BUTTON ====== */
        .btn-register {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(240, 147, 251, 0.4);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-register::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        .btn-register:hover::after {
            left: 100%;
        }

        .btn-register.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-register .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn-register.loading .spinner {
            display: block;
        }

        .btn-register.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ====== LINK ====== */
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .login-link a {
            color: #f093fb;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            transition: width 0.3s;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        .login-link a:hover {
            color: #f5576c;
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 480px) {
            .register-wrapper {
                padding: 10px;
                margin: 10px;
            }

            .register-container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 22px;
            }

            .logo-icon {
                font-size: 40px;
            }

            .form-group input {
                padding: 12px 14px;
                font-size: 14px;
            }

            .btn-register {
                padding: 14px;
                font-size: 15px;
            }

            .terms {
                font-size: 12px;
            }
        }

        @media (max-width: 360px) {
            .register-container {
                padding: 20px 15px;
            }

            .logo h1 {
                font-size: 18px;
            }

            .logo-icon {
                font-size: 35px;
            }
        }
    </style>
</head>
<body>
    <!-- ====== BACKGROUND ====== -->
    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>

    <!-- ====== PARTICLES ====== -->
    <div class="particles" id="particles"></div>

    <!-- ====== REGISTER ====== -->
    <div class="register-wrapper">
        <div class="register-container">
            <div class="logo">
                <span class="logo-icon">🔐</span>
                <h1>Create Account</h1>
                <p>🚀 JOIN THE SECURITY SYSTEM</p>
            </div>

            <form id="registerForm" method="POST">
                <div class="form-group">
                    <label><i>👤</i> Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label><i>📧</i> Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label><i>🔑</i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                    <div class="password-strength" id="strengthIndicator">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Weak</div>
                    </div>
                </div>

                <div class="form-group">
                    <label><i>✓</i> Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
                </div>

                <div class="error-message" id="errorMessage">
                    <span>⚠️</span>
                    <span id="errorText">Registration failed</span>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">
                    <span class="btn-text">🚀 Create Account</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="login-link">
                Already have an account? <a href="{{ url_for('login') }}">Login Here</a>
            </div>
        </div>
    </div>

    <script>
        // ====== PARTICLES ======
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 40;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 4 + 2;
                const duration = Math.random() * 15 + 10;
                const delay = Math.random() * 10;
                const x = Math.random() * 100;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = x + '%';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                
                container.appendChild(particle);
            }
        }

        createParticles();

        // ====== PASSWORD STRENGTH ======
        const passwordInput = document.getElementById('password');
        const strengthIndicator = document.getElementById('strengthIndicator');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            
            if (password.length === 0) {
                strengthIndicator.classList.remove('show');
                return;
            }
            
            strengthIndicator.classList.add('show');
            
            let strength = 0;
            let message = '';
            let color = '';
            
            if (password.length >= 8) strength += 1;
            if (password.length >= 12) strength += 1;
            if (/[a-z]/.test(password)) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 1;
            
            if (strength <= 2) {
                message = 'Weak';
                color = '#ff6b6b';
                width = '25%';
            } else if (strength <= 4) {
                message = 'Medium';
                color = '#ffd93d';
                width = '50%';
            } else if (strength <= 6) {
                message = 'Strong';
                color = '#6bcb77';
                width = '75%';
            } else {
                message = 'Very Strong';
                color = '#4facfe';
                width = '100%';
            }
            
            strengthFill.style.width = width;
            strengthFill.style.background = color;
            strengthText.textContent = message;
            strengthText.style.color = color;
        });

        // ====== CONFIRM PASSWORD ======
        const confirmInput = document.getElementById('confirmPassword');

        confirmInput.addEventListener('input', function() {
            if (this.value && this.value !== passwordInput.value) {
                this.style.borderColor = '#ff6b6b';
                this.style.boxShadow = '0 0 30px rgba(255, 107, 107, 0.15)';
            } else {
                this.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                this.style.boxShadow = 'none';
            }
        });

        // ====== FORM ======
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            const errorMsg = document.getElementById('errorMessage');
            const registerBtn = document.getElementById('registerBtn');
            
            errorMsg.classList.remove('show');
            document.querySelectorAll('.form-group input').forEach(input => {
                input.classList.remove('error');
            });
            
            if (!username || !email || !password || !confirm) {
                showError('Please fill in all fields');
                return;
            }
            
            if (password !== confirm) {
                showError('Passwords do not match');
                document.getElementById('confirmPassword').classList.add('error');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                document.getElementById('password').classList.add('error');
                return;
            }
            
            if (!terms) {
                showError('Please accept the Terms & Conditions');
                return;
            }
            
            registerBtn.classList.add('loading');
            
            fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    'username': username,
                    'email': email,
                    'password': password
                })
            })
            .then(response => response.text())
            .then(html => {
                if (html.includes('login') || html.includes('Login')) {
                    window.location.href = '/login?registered=true';
                } else {
                    if (html.includes('Username already exists')) {
                        showError('Username already exists');
                    } else {
                        showError('Registration failed. Please try again.');
                    }
                    registerBtn.classList.remove('loading');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showError('Network error. Please try again.');
                registerBtn.classList.remove('loading');
            });
        });

        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMsg.classList.add('show');
            
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 5000);
        }

        document.querySelectorAll('.form-group input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('label').style.color = '#f093fb';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('label').style.color = 'rgba(255, 255, 255, 0.7)';
            });
        });
    </script>
</body>
</html>
