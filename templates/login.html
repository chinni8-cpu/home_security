<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Security System - Login</title>
    <style>
        /* ====== RESET & BASE ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ====== ANIMATED BACKGROUND ====== */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* Animated Gradient Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #ff6b6b, #ee5a24);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #4facfe, #00f2fe);
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #a18cd1, #fbc2eb);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        .orb-4 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #f093fb, #f5576c);
            top: 20%;
            right: 10%;
            animation-delay: -3s;
        }

        .orb-5 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #4facfe, #43e97b);
            bottom: 20%;
            left: 10%;
            animation-delay: -7s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(40px, 20px) scale(1.05); }
        }

        /* ====== PARTICLES ====== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ====== LOGIN CONTAINER ====== */
        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            margin: 20px;
        }

        .login-container {
            width: 100%;
            padding: 40px 35px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ====== LOGO & TITLE ====== */
        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 60px;
            display: block;
            margin-bottom: 10px;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
            }
            50% {
                text-shadow: 0 0 40px rgba(79, 172, 254, 0.8), 0 0 80px rgba(79, 172, 254, 0.4);
            }
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-top: 5px;
            letter-spacing: 3px;
        }

        /* ====== FORM ====== */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        .form-group label i {
            margin-right: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: #4facfe;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.15);
            transform: translateY(-2px);
        }

        .form-group input.error {
            border-color: #ff6b6b;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.15);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease;
        }

        .error-message.show {
            display: flex;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ====== BUTTON ====== */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(79, 172, 254, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        .btn-login:hover::after {
            left: 100%;
        }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ====== LINKS ====== */
        .register-link {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .register-link a {
            color: #4facfe;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
        }

        .register-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            transition: width 0.3s;
        }

        .register-link a:hover::after {
            width: 100%;
        }

        .register-link a:hover {
            color: #00f2fe;
        }

        /* ====== SOCIAL LOGIN ====== */
        .social-login {
            margin-top: 25px;
            text-align: center;
        }

        .social-login p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-bottom: 15px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .social-login p::before {
            left: 0;
        }

        .social-login p::after {
            right: 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-icons a {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-icons a:hover {
            transform: translateY(-5px);
            background: rgba(79, 172, 254, 0.15);
            border-color: #4facfe;
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.2);
            color: white;
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 480px) {
            .login-wrapper {
                padding: 10px;
                margin: 10px;
            }

            .login-container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 24px;
            }

            .logo-icon {
                font-size: 50px;
            }

            .form-group input {
                padding: 12px 16px;
                font-size: 14px;
            }

            .btn-login {
                padding: 14px;
                font-size: 15px;
            }
        }

        @media (max-width: 360px) {
            .login-container {
                padding: 20px 15px;
            }

            .logo h1 {
                font-size: 20px;
            }

            .logo-icon {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- ====== BACKGROUND ====== -->
    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>

    <!-- ====== PARTICLES ====== -->
    <div class="particles" id="particles"></div>

    <!-- ====== LOGIN ====== -->
    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo">
                <span class="logo-icon">🎥</span>
                <h1>CCTV Security</h1>
                <p>🔐 SECURE ACCESS</p>
            </div>

            <form id="loginForm" method="POST">
                <div class="form-group">
                    <label><i>👤</i> Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label><i>🔑</i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="error-message" id="errorMessage">
                    <span>⚠️</span>
                    <span id="errorText">Invalid username or password</span>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">🚀 Login to Dashboard</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="register-link">
                Don't have an account? <a href="{{ url_for('register') }}">Register Now</a>
            </div>

            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-icons">
                    <a href="#" title="Google">🔵</a>
                    <a href="#" title="GitHub">⚫</a>
                    <a href="#" title="Microsoft">💻</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ====== PARTICLES ======
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 40;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 4 + 2;
                const duration = Math.random() * 15 + 10;
                const delay = Math.random() * 10;
                const x = Math.random() * 100;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = x + '%';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = delay + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                
                container.appendChild(particle);
            }
        }

        createParticles();

        // ====== FORM ======
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            errorMsg.classList.remove('show');
            document.querySelectorAll('.form-group input').forEach(input => {
                input.classList.remove('error');
            });
            
            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            loginBtn.classList.add('loading');
            
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    'username': username,
                    'password': password
                })
            })
            .then(response => response.text())
            .then(html => {
                if (html.includes('dashboard') || html.includes('CCTV Monitoring Dashboard')) {
                    window.location.href = '/dashboard';
                } else {
                    showError('Invalid username or password');
                    loginBtn.classList.remove('loading');
                    document.querySelectorAll('.form-group input').forEach(input => {
                        input.classList.add('error');
                    });
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showError('Network error. Please try again.');
                loginBtn.classList.remove('loading');
            });
        });

        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMsg.classList.add('show');
            
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 5000);
        }

        document.querySelectorAll('.form-group input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('label').style.color = '#4facfe';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('label').style.color = 'rgba(255, 255, 255, 0.7)';
            });
        });
    </script>
</body>
</html>
